name: Build & Push Docker Image

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/arcobaleno64/line-bot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore LINE.sln

      - name: Test
        run: >
          dotnet test LINE.sln
          --no-restore
          --logger "console;verbosity=normal"
          --blame-hang-timeout 60s

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/arcobaleno64/line-bot:latest
          pull: true
          no-cache: true

      - name: Trigger Render Deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -sf -X POST "$DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set, skipping"
          fi

      - name: Verify deployment
        if: ${{ secrets.RENDER_SERVICE_HOST != '' }}
        env:
          RENDER_SERVICE_HOST: ${{ secrets.RENDER_SERVICE_HOST }}
        run: bash scripts/verify-deployment.sh "$RENDER_SERVICE_HOST"
