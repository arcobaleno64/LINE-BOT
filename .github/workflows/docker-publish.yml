name: Build & Push Docker Image

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/arcobaleno64/line-bot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/arcobaleno64/line-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render Deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -sf -X POST "$DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set, skipping"
          fi
