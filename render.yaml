services:
  - type: web
    name: linebot-webhook
    runtime: docker
    plan: free
    region: singapore
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Line__ChannelSecret
        sync: false
      - key: Line__ChannelAccessToken
        sync: false
      - key: Ai__Provider
        value: Gemini
      - key: Ai__Gemini__ApiKey
        sync: false
      - key: Ai__Gemini__Model
        value: gemini-2.5-flash
      - key: Ai__Gemini__Endpoint
        value: https://generativelanguage.googleapis.com/v1beta/models
