services:
  - type: web
    name: linebot-webhook
    runtime: image
    image:
      url: ghcr.io/arcobaleno64/line-bot:latest
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE
        value: "false"
      - key: DOTNET_USE_POLLING_FILE_WATCHER
        value: "1"
      - key: Line__ChannelSecret
        sync: false
      - key: Line__ChannelAccessToken
        sync: false
      - key: Ai__Provider
        value: Gemini
      - key: Ai__Gemini__ApiKey
        sync: false
      - key: Ai__Gemini__SecondaryApiKey
        sync: false
      - key: Ai__Gemini__Model
        value: gemini-2.5-flash
      - key: Ai__Gemini__Endpoint
        value: https://generativelanguage.googleapis.com/v1beta/models
      - key: WebSearch__TavilyApiKey
        sync: false
